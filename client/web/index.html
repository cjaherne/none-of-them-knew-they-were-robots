<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Voice Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --text: #e4e4ef;
      --text-muted: #7a7a8e;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      min-height: 100dvh;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
      justify-content: center;
    }

    .mic-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .mic-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .mic-btn.recording {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .mic-btn svg {
      width: 32px;
      height: 32px;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
    }

    .status {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 1.25rem;
    }

    .text-input {
      display: flex;
      gap: 0.5rem;
    }

    .text-input input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
    }

    .text-input input:focus {
      border-color: var(--accent);
    }

    .text-input button {
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .text-input button:hover {
      opacity: 0.9;
    }

    .task-log {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .task-log h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .log-entry {
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8125rem;
    }

    .log-entry .time {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .log-entry.success { border-left: 3px solid var(--success); }
    .log-entry.error { border-left: 3px solid var(--danger); }
    .log-entry.pending { border-left: 3px solid var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Agent Voice Control</h1>
      <p>Speak or type a command to your agent team</p>
    </header>

    <div class="mic-section">
      <button class="mic-btn" id="micBtn" aria-label="Record voice command">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="status" id="status">Tap to speak</div>
    </div>

    <div class="text-input">
      <input type="text" id="textInput" placeholder="Or type a command..." />
      <button id="sendBtn">Send</button>
    </div>

    <div class="task-log" id="taskLog">
      <h2>Task Log</h2>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
