<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent MVP Test Harness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1a1a24;
      --border: #1e1e2e;
      --border-active: #2e2e42;
      --text: #e4e4ef;
      --text-muted: #7a7a8e;
      --text-dim: #4a4a5e;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .settings-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.375rem 0.625rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .settings-toggle:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* --- Settings Panel --- */
    .settings {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .settings.visible { display: block; }

    .settings label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .settings label:not(:first-child) {
      margin-top: 0.75rem;
    }

    .settings input, .settings select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8125rem;
      outline: none;
    }

    .settings input:focus, .settings select:focus {
      border-color: var(--accent);
    }

    .backend-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 0.375rem;
    }

    .backend-indicator.disconnected { background: var(--danger); }

    /* --- Command Input --- */
    .command-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .command-input {
      display: flex;
      gap: 0.5rem;
    }

    .command-input textarea {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 48px;
      max-height: 160px;
    }

    .command-input textarea:focus {
      border-color: var(--accent);
    }

    .command-input textarea::placeholder {
      color: var(--text-dim);
    }

    .command-actions {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .send-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    .mic-btn-small {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .mic-btn-small:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .mic-btn-small.recording {
      border-color: var(--danger);
      color: var(--danger);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .mic-btn-small svg { width: 18px; height: 18px; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    }

    .project-settings {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.375rem 0.5rem;
      align-items: center;
    }

    .project-settings .field-label {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-align: right;
    }

    .project-settings input {
      padding: 0.4rem 0.625rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8125rem;
      outline: none;
    }

    .project-settings input:focus,
    .project-settings select:focus { border-color: var(--accent); }
    .project-settings input::placeholder { color: var(--text-dim); }

    .project-settings select {
      padding: 0.4rem 0.625rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8125rem;
      outline: none;
    }

    .branch-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    /* --- Pipeline Progress --- */
    .pipeline {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .pipeline.visible { display: block; }

    .pipeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .pipeline-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .pipeline-task-id {
      font-size: 0.6875rem;
      color: var(--text-dim);
      font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    }

    .pipeline-stages {
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
    }

    .stage-bar {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .stage-bar.running {
      background: var(--accent);
      animation: barPulse 1.5s ease-in-out infinite;
    }

    .stage-bar.succeeded { background: var(--success); }
    .stage-bar.failed { background: var(--danger); }

    @keyframes barPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stage-label {
      font-size: 0.6875rem;
      color: var(--text-dim);
      text-align: center;
    }

    .stage-label.active { color: var(--text); }

    .stage-connector {
      width: 16px;
      height: 2px;
      background: var(--border);
      flex-shrink: 0;
      margin-bottom: 1.125rem;
    }

    .stage-detail {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .pipeline-summary {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.5rem 0.625rem;
      background: var(--surface-2);
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .pipeline-summary .summary-stat {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .pipeline-summary .summary-value {
      color: var(--text);
      font-weight: 600;
    }

    .stage-card {
      padding: 0.5rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
    }

    .stage-card.running { border-left: 3px solid var(--accent); }
    .stage-card.succeeded { border-left: 3px solid var(--success); }
    .stage-card.failed { border-left: 3px solid var(--danger); }

    .stage-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stage-card .agent-name {
      color: var(--accent);
      font-weight: 500;
      font-size: 0.75rem;
    }

    .stage-card .stage-meta {
      color: var(--text-muted);
      font-size: 0.6875rem;
    }

    .stage-files {
      margin-top: 0.375rem;
      font-size: 0.6875rem;
      color: var(--text-dim);
      font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
      line-height: 1.5;
    }

    .stage-errors {
      margin-top: 0.375rem;
      font-size: 0.75rem;
      color: var(--danger);
    }

    .feedback-card {
      padding: 0.5rem 0.625rem;
      background: var(--surface-2);
      border: 1px solid var(--warning);
      border-radius: 6px;
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.6875rem;
      color: var(--warning);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.375rem;
    }

    .feedback-arrow {
      color: var(--text-dim);
    }

    .feedback-body {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* --- Task Log --- */
    .task-log {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .task-log h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .log-entry {
      padding: 0.625rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8125rem;
      line-height: 1.4;
    }

    .log-entry .time {
      color: var(--text-dim);
      font-size: 0.6875rem;
      margin-right: 0.375rem;
    }

    .log-entry.success { border-left: 3px solid var(--success); }
    .log-entry.error { border-left: 3px solid var(--danger); }
    .log-entry.pending { border-left: 3px solid var(--accent); }

    .status-bar {
      font-size: 0.8125rem;
      color: var(--text-muted);
      min-height: 1.25rem;
    }

    .voice-options {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text);
      cursor: pointer;
    }

    .toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .approval-banner {
      display: none;
      background: var(--surface-2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 1rem;
    }

    .approval-banner.visible { display: block; }

    .approval-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .approval-header h3 {
      font-size: 0.8125rem;
      color: var(--accent);
    }

    .approval-type-badge {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.125rem 0.5rem;
    }

    .approval-summary-text {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .approval-preview {
      margin-bottom: 0.75rem;
    }

    .approval-preview summary {
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      margin-bottom: 0.375rem;
    }

    .approval-preview pre {
      font-size: 0.6875rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    }

    .approval-feedback-input textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8125rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      margin-bottom: 0.75rem;
    }

    .approval-feedback-input textarea:focus {
      border-color: var(--accent);
    }

    .approval-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .approval-actions button {
      padding: 0.5rem 1.25rem;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .approval-actions button:hover { opacity: 0.85; }

    .btn-approve { background: var(--success); }
    .btn-reject { background: var(--danger); }
    .btn-revise { background: var(--warning); color: #000; }
    .btn-continue { background: var(--success); }
    .btn-redesign { background: var(--accent); }

    .cancel-btn {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.6875rem;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }

    .cancel-btn:hover { opacity: 0.85; }

    .cost-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.125rem 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.6875rem;
      color: var(--text-muted);
      font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Agent MVP Test Harness</h1>
      <button class="settings-toggle" id="settingsToggle">Settings</button>
    </header>

    <div class="settings" id="settingsPanel">
      <label for="backendSelect">Backend</label>
      <select id="backendSelect">
        <option value="local">Local (http://localhost:3000)</option>
        <option value="custom">Cloud / Custom URL</option>
      </select>

      <label for="customUrl">API URL</label>
      <input type="text" id="customUrl" placeholder="https://your-api-gateway-url.amazonaws.com/dev" />
    </div>

    <div class="command-section">
      <div class="command-input">
        <textarea id="textInput" rows="2" placeholder="Describe what you want the agents to build..."></textarea>
        <div class="command-actions">
          <button class="mic-btn-small" id="micBtn" aria-label="Record voice command">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn">Run Pipeline</button>
        </div>
      </div>

      <div class="project-settings">
        <span class="field-label">Workspace</span>
        <input type="text" id="workspaceInput" placeholder="C:\dev\my-project (local path)" />

        <span class="field-label">Repo</span>
        <input type="text" id="repoInput" placeholder="https://github.com/user/repo (optional)" />

        <span class="field-label">Branches</span>
        <div class="branch-row">
          <input type="text" id="baseBranchInput" placeholder="Base branch (default: main)" />
          <input type="text" id="branchInput" placeholder="Work branch (auto if blank)" />
        </div>

        <span class="field-label">Pipeline</span>
        <select id="pipelineModeSelect">
          <option value="full">Full (design + coding + testing)</option>
          <option value="auto">Auto (BigBoss decides)</option>
          <option value="code-test">Code + test (skip design)</option>
          <option value="code-only">Code only</option>
        </select>

        <span class="field-label">Voice</span>
        <div class="voice-options">
          <label class="toggle-label"><input type="checkbox" id="voiceToggle" checked /> Speak status updates</label>
          <label class="toggle-label"><input type="checkbox" id="approvalToggle" /> Require design approval</label>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status"></div>

    <div class="approval-banner" id="approvalBanner">
      <div class="approval-header">
        <h3 id="approvalTitle">Design Review</h3>
        <span class="approval-type-badge" id="approvalTypeBadge">BigBoss</span>
      </div>
      <p id="approvalSummary" class="approval-summary-text"></p>
      <details class="approval-preview" id="approvalPreviewBlock">
        <summary>View details</summary>
        <pre id="approvalPreview"></pre>
      </details>
      <div class="approval-feedback-input" id="revisionInputBlock" style="display: none;">
        <textarea id="revisionInput" rows="2" placeholder="Describe what changes you want..."></textarea>
      </div>
      <div class="approval-actions" id="approvalActions"></div>
    </div>

    <div class="pipeline" id="pipelinePanel">
      <div class="pipeline-header">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <h2>Pipeline</h2>
          <button class="cancel-btn" id="cancelBtn" style="display:none;">Stop</button>
        </div>
        <span class="pipeline-task-id" id="pipelineTaskId"></span>
      </div>
      <div class="pipeline-stages" id="pipelineStages"></div>
      <div class="stage-detail" id="stageDetail"></div>
    </div>

    <div class="task-log" id="taskLog">
      <h2>Event Log</h2>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
