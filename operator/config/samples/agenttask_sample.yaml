apiVersion: agents.robots.io/v1alpha1
kind: AgentTask
metadata:
  name: sample-pipeline-ux-designer
  namespace: agent-system
  labels:
    agents.robots.io/pipeline: pipeline-sample
    agents.robots.io/stage: design
    agents.robots.io/agent: ux-designer
spec:
  pipelineRef: pipeline-sample
  agentType: ux-designer
  category: design
  prompt: "Build a login page with Google and GitHub social authentication"
  context:
    focus: "login flow and social auth UX"
  skillPack: ux-designer
  repo: "https://github.com/example/my-app.git"
  cursorFlags:
    - "--force"
    - "--trust"
    - "--output-format"
    - "stream-json"
