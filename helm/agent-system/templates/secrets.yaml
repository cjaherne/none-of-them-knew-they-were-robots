{{/*
  These secrets are NOT populated by Helm -- they must be created before deploying
  the chart, either manually or via the setup script (scripts/setup-github.sh).
  The templates below ensure the expected Secret names are documented and
  that `helm template` validates references.
*/}}
{{- if not (lookup "v1" "Secret" .Values.namespace .Values.github.secretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.github.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  token: "PLACEHOLDER -- run scripts/setup-github.sh"
  username: "PLACEHOLDER"
  email: "PLACEHOLDER"
{{- end }}
{{- if not (lookup "v1" "Secret" .Values.namespace .Values.cursorApiKey.secretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cursorApiKey.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{ .Values.cursorApiKey.secretKey }}: "PLACEHOLDER -- set your Cursor API key"
{{- end }}
