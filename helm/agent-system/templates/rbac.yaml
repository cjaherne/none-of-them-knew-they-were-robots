apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
  {{- if .Values.aws.serviceAccountRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.serviceAccountRoleArn }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
  {{- if .Values.aws.serviceAccountRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.serviceAccountRoleArn }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-operator-role
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agents.robots.io"]
    resources: ["agentpipelines", "agenttasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.robots.io"]
    resources: ["agentpipelines/status", "agenttasks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.robots.io"]
    resources: ["agentpipelines/finalizers", "agenttasks/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-operator-binding
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-operator-role
subjects:
  - kind: ServiceAccount
    name: agent-operator
    namespace: {{ .Values.namespace }}
