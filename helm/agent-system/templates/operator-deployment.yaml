apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-system.labels" . | nindent 4 }}
    app: agent-operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app: agent-operator
  template:
    metadata:
      labels:
        app: agent-operator
        {{- include "agent-system.labels" . | nindent 8 }}
    spec:
      serviceAccountName: agent-operator
      containers:
        - name: manager
          image: {{ .Values.operator.image }}
          args:
            - --leader-elect={{ gt (int .Values.operator.replicas) 1 }}
            - --agent-image={{ .Values.agentRuntime.image }}
            - --skills-bucket={{ .Values.aws.skillsBucket }}
            - --results-table={{ .Values.aws.resultsTable }}
            - --agent-namespace={{ .Values.namespace }}
            - --github-secret-name={{ .Values.github.secretName }}
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
