# Agent registry for the app (server loads skill packs from disk). Optional `resources` entries are unused metadata (historical).
categories:
  - name: analysis
    order: 1
    description: Agents that examine existing code and identify issues

  - name: design
    order: 2
    description: Agents that produce specifications and design artifacts

  - name: coding
    order: 3
    description: Agents that write and modify code

  - name: validation
    order: 4
    description: Agents that verify quality through testing and review

agents:
  - type: bigboss
    displayName: BigBoss Orchestrator
    category: analysis
    skillPack: bigboss
    resources:
      memory: "1Gi"
      cpu: "500m"
    cursorFlags: ["--trust", "--output-format", "stream-json"]

  - type: ux-designer
    displayName: UX Designer
    category: design
    skillPack: ux-designer
    resources:
      memory: "2Gi"
      cpu: "1"
    cursorFlags: ["--force", "--trust", "--output-format", "stream-json"]

  - type: core-code-designer
    displayName: Core Code Designer
    category: design
    skillPack: core-code-designer
    resources:
      memory: "2Gi"
      cpu: "1"
    cursorFlags: ["--force", "--trust", "--output-format", "stream-json"]

  - type: graphics-designer
    displayName: Graphics Designer
    category: design
    skillPack: graphics-designer
    resources:
      memory: "2Gi"
      cpu: "1"
    cursorFlags: ["--force", "--trust", "--output-format", "stream-json"]

  - type: game-designer
    displayName: Game Designer
