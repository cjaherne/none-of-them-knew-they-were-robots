  # To add a new specialist agent:
  # 1. Add an entry here
  # 2. Create a skill pack directory in skills/<skillPack>/
  #    with system-prompt.md, constraints.json, cursor-rules.md
  # 3. Redeploy -- no code changes needed
  #
  # Example:
  # - type: db-migration
  #   displayName: Database Migration Specialist
  #   category: coding
  #   skillPack: db-migration
  #   resources:
  #     memory: "2Gi"
  #     cpu: "1"
  #   cursorFlags: ["--force", "--trust", "--output-format", "stream-json"]
